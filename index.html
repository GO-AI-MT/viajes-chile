<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes Chile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-info fixed-top">
            <div class="container">
                <a class="navbar-brand" href="#">Viajes Chile</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="#inicio">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="#quienes-somos">Quiénes Somos</a></li>
                        <li class="nav-item"><a class="nav-link" href="#destacados">Destacados</a></li>
                        <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main id="inicio">
        <section id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active"><img src="assets/img/carousel1.jpg" class="d-block w-100" alt="Llamas"></div>
                <div class="carousel-item"><img src="assets/img/carousel2.jpg" class="d-block w-100" alt="Moais"></div>
                <div class="carousel-item"><img src="assets/img/carousel3.jpg" class="d-block w-100" alt="Pingüino"></div>
            </div>
        </section>

        <section id="quienes-somos" class="container py-5">
            <h2 class="text-center">¿QUIÉNES SOMOS?</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="bg-info text-center py-2"><i class="fas fa-plane"></i></div>
                    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Donec mattis ante nulla.</p>
                </div>
                </div>
        </section>

        <section id="destacados" class="bg-light py-5">
            <div class="container">
                <h2 class="text-center">DESTACADOS</h2>
                <div class="row">
                    <div class="col-md-3">
                        <div class="card"><img src="assets/img/card1.jpg" class="card-img-top">
                            <div class="card-body"><p class="card-text">Descripción breve.</p></div>
                        </div>
                    </div>
                    </div>
            </div>
        </section>

        <section id="contacto" class="container py-5">
            <h2 class="text-center">CONTACTO</h2>
            <form>
                <div class="mb-3"><label>Nombre</label><input type="text" class="form-control"></div>
                <div class="mb-3"><label>Asunto</label><input type="text" class="form-control"></div>
                <div class="mb-3"><label>Mensaje</label><textarea class="form-control"></textarea></div>
                <button type="submit" class="btn btn-info">Enviar</button>
            </form>
        </section>
    </main>
